"A consulting service entity (e.g., AI & Intelligent Systems, Cybersecurity)."
type Service {
    id: ID!
    slug: String!
    icon: String
    icon_color: String
    category: String
    is_active: Boolean!
    order: Int!

    "Translated via header-based locale."
    title: String!
    short_description: String
    description: String
    meta_title: String
    meta_description: String
    meta_keywords: String

    hero: ServiceHero!
    challenge: ServiceChallenge
    howWeDeliver: ServiceHowWeDeliver
    capabilities: ServiceCapabilities
    keyUseCases: ServiceUseCasesSection
    ourApproach: ServiceApproachSection
    industryApplications: ServiceIndustryApplicationsSection
    technologies: ServiceTechnologiesSection
    businessImpact: ServiceBusinessImpactSection
    differentiators: ServiceDifferentiatorsSection
    closing: ServiceClosing!

    features: [ServiceFeature!]!
    benefits: [ServiceBenefit!]!

    created_at: DateTime!
    updated_at: DateTime!
}

type ServiceHero {
    tagline: String
    headline: String
    subheadline: String
    ctaPrimaryLabel: String
    ctaSecondaryLabel: String
    stats: [ServiceStat!]!
}

type ServiceStat {
    icon: String
    value: String!
    label: String!
}

type ServiceChallenge {
    title: String
    description: String
    painPoints: [ServicePainPoint!]!
}

type ServicePainPoint {
    text: String!
}

type ServiceHowWeDeliver {
    title: String
    description: String
    items: [ServiceDeliveryItem!]!
}

type ServiceDeliveryItem {
    icon: String
    text: String!
}

type ServiceCapabilities {
    title: String
    groups: [ServiceCapabilityGroup!]!
}

type ServiceCapabilityGroup {
    icon: String
    name: String!
    items: [ServiceCapabilityItem!]!
}

type ServiceCapabilityItem {
    name: String!
}

type ServiceUseCasesSection {
    title: String
    description: String
    items: [ServiceUseCase!]!
}

type ServiceUseCase {
    text: String!
}

type ServiceApproachSection {
    title: String
    description: String
    items: [ServiceApproachStep!]!
}

type ServiceApproachStep {
    icon: String
    title: String!
    description: String
}

type ServiceIndustryApplicationsSection {
    title: String
    description: String
    industries: [ServiceIndustryApplication!]!
}

type ServiceIndustryApplication {
    icon: String
    name: String!
    description: String
    useCases: [ServiceIndustryUseCase!]!
}

type ServiceIndustryUseCase {
    text: String!
}

type ServiceTechnologiesSection {
    title: String
    description: String
    items: [ServiceTechnology!]!
}

type ServiceTechnology {
    icon: String
    name: String!
}

type ServiceBusinessImpactSection {
    title: String
    description: String
    items: [ServiceBusinessImpactItem!]!
}

type ServiceBusinessImpactItem {
    icon: String
    title: String!
    description: String
}

type ServiceDifferentiatorsSection {
    title: String
    points: [ServiceDifferentiator!]!
}

type ServiceDifferentiator {
    icon: String
    title: String!
    description: String
}

type ServiceClosing {
    title: String
    subtitle: String
}

type ServiceFeature {
    id: ID!
    service_id: ID!
    title: String!
    description: String
    icon: String
    order: Int!
    created_at: DateTime!
    updated_at: DateTime!
    service: Service @belongsTo
}

type ServiceBenefit {
    id: ID!
    service_id: ID!
    title: String!
    description: String
    icon: String
    order: Int!
    created_at: DateTime!
    updated_at: DateTime!
    service: Service @belongsTo
}

extend type Query {
    "Return the list of active, published services (card-level content)."
    services(is_active: Boolean, limit: Int): [Service!]!
        @field(resolver: "App\\GraphQL\\Queries\\ServicesList")

    "Return a single service by slug (public, active only) or by ID (admin, any status)."
    service(slug: String, id: ID): Service
        @field(resolver: "App\\GraphQL\\Queries\\ServiceDetail")
}

"Thin input for the card-level service editor. For the full multi-section editor use CreateServiceAdminInput."
input CreateServiceInput {
    title: String! @rules(apply: ["required", "max:255"])
    short_description: String
    description: String
    icon: String
    icon_color: String
    category: String
    slug: String
    order: Int
    is_active: Boolean
    "Locale for translatable fields (title, short_description, description). Defaults to en."
    locale: String
}

input UpdateServiceInput {
    title: String @rules(apply: ["max:255"])
    short_description: String
    description: String
    icon: String
    icon_color: String
    category: String
    slug: String
    order: Int
    is_active: Boolean
    "Locale for translatable fields. Defaults to en."
    locale: String
    meta_title: String
    meta_description: String
    meta_keywords: String
    hero_tagline: String
    hero_headline: String
    hero_subheadline: String
    hero_cta_primary_label: String
    hero_cta_secondary_label: String
    challenge_title: String
    challenge_description: String
    delivery_title: String
    delivery_description: String
    capabilities_title: String
    use_cases_title: String
    use_cases_description: String
    approach_title: String
    approach_description: String
    industry_title: String
    industry_description: String
    technologies_title: String
    technologies_description: String
    business_impact_title: String
    business_impact_description: String
    differentiators_title: String
    closing_title: String
    closing_subtitle: String
}

input CreateServiceFeatureInput {
    title: String! @rules(apply: ["required", "max:255"])
    description: String
    icon: String
    order: Int
    locale: String
}

input UpdateServiceFeatureInput {
    title: String @rules(apply: ["max:255"])
    description: String
    icon: String
    order: Int
    locale: String
}

extend type Mutation {
    createService(input: CreateServiceInput!): Service!
        @field(resolver: "App\\GraphQL\\Mutations\\ServiceCrud@create")
        @guard(with: ["sanctum"])

    updateService(id: ID!, input: UpdateServiceInput!): Service!
        @field(resolver: "App\\GraphQL\\Mutations\\ServiceCrud@update")
        @guard(with: ["sanctum"])

    deleteService(id: ID!): DeleteResponse!
        @field(resolver: "App\\GraphQL\\Mutations\\ServiceCrud@delete")
        @guard(with: ["sanctum"])

    createServiceFeature(serviceId: ID!, input: CreateServiceFeatureInput!): ServiceFeature!
        @field(resolver: "App\\GraphQL\\Mutations\\ServiceFeatureCrud@create")
        @guard(with: ["sanctum"])

    updateServiceFeature(id: ID!, input: UpdateServiceFeatureInput!): ServiceFeature!
        @field(resolver: "App\\GraphQL\\Mutations\\ServiceFeatureCrud@update")
        @guard(with: ["sanctum"])

    deleteServiceFeature(id: ID!): DeleteResponse!
        @field(resolver: "App\\GraphQL\\Mutations\\ServiceFeatureCrud@delete")
        @guard(with: ["sanctum"])

    sortServiceFeatures(serviceId: ID!, orderedIds: [ID!]!): Boolean!
        @field(resolver: "App\\GraphQL\\Mutations\\ServiceFeatureCrud@reorder")
        @guard(with: ["sanctum"])
}

