# ---------------------------------------------------------------------------
# Admin queries
# ---------------------------------------------------------------------------

extend type Query {
  "Return a single service by ID with ALL translations and ALL child relations."
  serviceForAdmin(id: ID!): ServiceForAdmin
    @guard(with: ["sanctum"])
    @field(resolver: "App\\GraphQL\\Queries\\Admin\\ServiceForAdminQuery")

  "Return all services (optionally filtered by isActive) with translations only."
  servicesForAdmin(isActive: Boolean): [ServiceForAdmin!]!
    @guard(with: ["sanctum"])
    @field(resolver: "App\\GraphQL\\Queries\\Admin\\ServicesForAdminQuery")
}

